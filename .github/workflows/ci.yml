name: CI

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: "Build and Test"
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: rui314/setup-mold@v1
    - uses: awalsh128/cache-apt-pkgs-action@latest
      with:
        packages:  libdbus-1-dev libusb-dev libhidapi-dev libhidapi-hidraw0 pkg-config libudev-dev libgtk-3-dev 
        version: 1.0
    - name: "Install Rust"
      uses: dtolnay/rust-toolchain@stable
    - name: "Cache cargo"
      uses: Swatinem/rust-cache@v2
    - name: Build
      working-directory: ./razer_control_gui
      run: cargo build --verbose
    - name: Run tests
      working-directory: ./razer_control_gui
      run: cargo test --verbose

  install:
    # This assumes that the worker will be using systemctl
    name: "Install on Github Worker"
    runs-on: ubuntu-latest
    needs: build
    steps:
    - uses: actions/checkout@v4
    - uses: awalsh128/cache-apt-pkgs-action@latest
      with:
        packages:  libdbus-1-dev libusb-dev libhidapi-dev libhidapi-hidraw0 pkg-config libudev-dev libgtk-3-dev 
        version: 1.0
    - name: "Install"
      working-directory: ./razer_control_gui
      # According to this, sudo sould run ok: https://docs.github.com/en/actions/using-github-hosted-runners/using-github-hosted-runners/about-github-hosted-runners#administrative-privileges
      run: ./install.sh install
    - name: "Check installation"
      run: |
        for f in \
          "$HOME/.local/share/razercontrol" \
          "/usr/share/razercontrol/daemon" \
          "/usr/share/razercontrol/laptops.json" \
          "/etc/udev/rules.d/99-hidraw-permissions.rules" \
          "/usr/bin/razer-cli" \
          "/usr/bin/razer-settings" \
          "/usr/share/applications/razer-settings.desktop"; do
          test -e "$f" || { echo "Missing: $f"; exit 1; }
        done
        systemctl --user is-enabled razercontrol.service
        which razer-cli
        which razer-settings

  build-nix:
    name: "Build and check Nix"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - run: nix build
      - run: nix flake check
